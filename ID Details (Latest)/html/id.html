<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/id.css">
    <title>ID Details</title>
</head>
<body>

    <!-- Main content -->
    <main class="main">
        <!-- Search bar -->
        <div class="search-wrapper">
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search employee" autocomplete="off">
                <button class="dropdown-btn" id="dropdownBtn" aria-label="Show employees">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </button>
            </div>
            <ul class="dropdown-list" id="dropdownList"></ul>
        </div>

        <!-- Card -->
        <section class="card" id="card">
            <!-- Empty state -->
            <div class="empty-state" id="emptyState">
                <svg width="90" height="110" viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
                    <g fill="#c8cdd3">
                        <circle cx="38" cy="18" r="7"/>
                        <rect x="34" y="27" width="9" height="25" rx="2"/>
                        <rect x="30" y="52" width="6" height="22" rx="1.5"/>
                        <rect x="41" y="52" width="6" height="22" rx="1.5"/>
                        <rect x="33" y="32" width="18" height="5" rx="1.5" transform="rotate(25 42 34)"/>
                    </g>
                    <circle cx="72" cy="20" r="10" fill="none" stroke="#c8cdd3" stroke-width="2.5"/>
                    <line x1="64" y1="28" x2="55" y2="38" stroke="#c8cdd3" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <p class="empty-text">No employee selected yet. Search to view ID details.</p>
            </div>

            <!-- Details state -->
            <div class="details-view hidden" id="detailsView">
                <aside class="sidebar">
                    <div class="photo-box">
                        <img id="employeePhoto" src="" alt="Employee photo">
                    </div>
                    <div class="signature-box">
                        <img id="employeeSignature" src="" alt="Signature">
                    </div>
                    <span class="mode-label" id="modeLabel">View mode</span>
                </aside>

                <div class="details-content">
                    <div class="section-header">
                        <h2 class="section-title">FRONT DETAILS</h2>
                        <button class="edit-icon-btn" id="editBtn" aria-label="Edit">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 20h9"/>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="field-grid">
                        <div class="field">
                            <label>FULL NAME</label>
                            <input type="text" id="fullName" data-field="fullName" disabled>
                        </div>
                        <div class="field">
                            <label>CONTACT NUMBER</label>
                            <input type="text" id="contactNumber" data-field="contactNumber" disabled>
                        </div>
                        <div class="field">
                            <label>ID NUMBER</label>
                            <input type="text" id="idNumber" data-field="idNumber" disabled>
                        </div>
                        <div class="field">
                            <label>POSITION</label>
                            <input type="text" id="position" data-field="position" disabled>
                        </div>
                        <div class="field field-full">
                            <label>EMAIL ADDRESS</label>
                            <input type="email" id="email" data-field="email" disabled>
                        </div>
                    </div>

                    <hr class="section-divider">

                    <h2 class="section-title">BACK DETAILS</h2>

                    <div class="field-grid">
                        <div class="field">
                            <label>BIRTHDATE</label>
                            <div class="input-with-icon">
                                <input type="text" id="birthdate" data-field="birthdate" disabled>
                                <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                                    <line x1="16" y1="2" x2="16" y2="6"/>
                                    <line x1="8" y1="2" x2="8" y2="6"/>
                                    <line x1="3" y1="10" x2="21" y2="10"/>
                                </svg>
                            </div>
                        </div>
                        <div class="field">
                            <label>STATUS</label>
                            <div class="input-with-icon">
                                <select id="status" data-field="status" disabled>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                    <option value="On Leave">On Leave</option>
                                </select>
                                <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="m6 9 6 6 6-6"/>
                                </svg>
                            </div>
                        </div>
                        <div class="field">
                            <label>ADDRESS</label>
                            <input type="text" id="address" data-field="address" disabled>
                        </div>
                        <div class="field">
                            <label>EMERGENCY CONTACT</label>
                            <input type="text" id="emergencyContact" data-field="emergencyContact" disabled>
                        </div>
                        <div class="field">
                            <label>EMERGENCY NUMBER</label>
                            <input type="text" id="emergencyNumber" data-field="emergencyNumber" disabled>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Action buttons -->
        <div class="actions hidden" id="actions">
            <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn btn-save" id="saveBtn" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Save
            </button>
        </div>
    </main>

    <script src="../js/id.js"></script>
</body>
</html>
